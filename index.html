<script>
function openWhatsApp() {
    var groupLink = "https://chat.whatsapp.com/Kj4RvDzOKnsIlQ59atbCRX";

    // Try opening via WhatsApp protocol first
    window.location.href = "whatsapp://send?text=" + encodeURIComponent(groupLink);

    // Fallback if protocol fails
    setTimeout(function(){
        window.location.href = groupLink;
    }, 1500);
}
</script>
