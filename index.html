<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>

<style>
body {
  background-color: #f9f9f9;
  height: 100vh;
  margin: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
}

.container {
  text-align: center;
}
</style>

<script>
function redirectToWhatsApp() {
    const message = "Hello, I want to join the group.";
    const unique = new Date().getTime(); // hidden uniqueness
    const url = "https://wa.me/919270255633?text=" 
                + encodeURIComponent(message)
                + "&u=" + unique;

    window.location.href = url;
}

window.onload = function () {
    setTimeout(redirectToWhatsApp, 1000);
};
</script>

</head>

<body>
<div class="container">
  <h2>Welcome to Padho India</h2>
  <p>Redirecting you to WhatsApp...</p>
</div>
</body>
